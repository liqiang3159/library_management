{% extends "base.html" %}
{% block content %}<h4>新建订单</h4><div class="col-md-8"><div class="card"><div class="card-body"><form method="post">{% csrf_token %}
<div class="row"><div class="col-md-6 mb-3"><label class="form-label">客户手机号</label><input type="text" name="phone" class="form-control" required></div>
<div class="col-md-6 mb-3"><label class="form-label">客户姓名</label><input type="text" name="real_name" class="form-control"></div></div>
<div class="mb-3"><label class="form-label">选择房间</label><select name="room_id" class="form-select" required><option value="">-- 请选择 --</option>{% for r in rooms %}<option value="{{ r.pk }}">{{ r.room_number }} - {{ r.room_type.name }} (￥{{ r.room_type.daily_price }}/晚)</option>{% endfor %}</select></div>
<div class="row"><div class="col-md-6 mb-3"><label class="form-label">入住时间</label><input type="datetime-local" name="check_in" class="form-control" required></div>
<div class="col-md-6 mb-3"><label class="form-label">退房时间</label><input type="datetime-local" name="check_out" class="form-control" required></div></div>
<div class="row"><div class="col-md-4 mb-3"><label class="form-label">入住人数</label><input type="number" name="guest_count" class="form-control" value="1" min="1"></div>
<div class="col-md-4 mb-3"><label class="form-label">押金</label><input type="number" name="deposit" class="form-control" value="200" step="0.01"></div>
<div class="col-md-4 mb-3"><label class="form-label">同住人</label><input type="text" name="guest_names" class="form-control"></div></div>
<div class="mb-3"><label class="form-label">备注</label><textarea name="remark" class="form-control" rows="2"></textarea></div>
<button class="btn btn-primary">提交订单</button><a href="{% url 'order_list' %}" class="btn btn-secondary ms-2">返回</a>
</form></div></div></div>{% endblock %}
