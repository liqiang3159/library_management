{% extends "base.html" %}
{% block content %}
<h4>更新清洁任务 - {{ task.room.room_number }}</h4>
<div class="col-md-4"><div class="card"><div class="card-body">
<p>当前状态: {{ task.get_status_display }}</p><p>退房时间: {{ task.check_out_time|date:'Y-m-d H:i'|default:'-' }}</p>
<form method="post" enctype="multipart/form-data">{% csrf_token %}<div class="mb-3"><label class="form-label">状态</label>
<select name="status" class="form-select"><option value="cleaning" {% if task.status == 'cleaning' %}selected{% endif %}>清洁中</option><option value="cleaned" {% if task.status == 'cleaned' %}selected{% endif %}>已清洁</option><option value="completed" {% if task.status == 'completed' %}selected{% endif %}>已完成</option><option value="issue" {% if task.status == 'issue' %}selected{% endif %}>问题上报</option></select></div>
<div class="mb-3"><label class="form-label">问题描述</label><textarea name="issue_description" class="form-control" rows="2">{{ task.issue_description }}</textarea></div>
<div class="mb-3"><label class="form-label">巡检照片</label><input type="file" name="inspection_photo" class="form-control"></div>
<button class="btn btn-primary">更新</button><a href="{% url 'cleaning_list' %}" class="btn btn-secondary ms-2">返回</a>
</form></div></div></div>{% endblock %}
