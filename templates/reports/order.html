{% extends "base.html" %}
{% block content %}<h4><i class="bi bi-bar-chart"></i> 订单报表</h4>
<form method="get" class="row g-2 mb-3"><div class="col-md-3"><input type="date" name="start" class="form-control" value="{{ start }}"></div><div class="col-md-3"><input type="date" name="end" class="form-control" value="{{ end }}"></div><div class="col-md-2"><button class="btn btn-primary">查询</button></div></form>
<div class="row g-3">{% for s in status_choices %}<div class="col-md-2"><div class="card"><div class="card-body text-center"><h3>{% for k,v in status_counts.items %}{% if k == s.0 %}{{ v }}{% endif %}{% endfor %}</h3><p class="text-muted small">{{ s.1 }}</p></div></div></div>{% endfor %}
<div class="col-md-2"><div class="card"><div class="card-body text-center"><h3>{{ total }}</h3><p class="text-muted small">总计</p></div></div></div></div>
{% endblock %}
