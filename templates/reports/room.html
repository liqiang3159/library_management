{% extends "base.html" %}
{% block content %}<h4><i class="bi bi-pie-chart"></i> 客房报表</h4>
<div class="row g-3"><div class="col-md-4"><div class="card"><div class="card-body text-center"><h1>{{ occupancy_rate }}%</h1><p class="text-muted">入住率</p></div></div></div>
{% for s in status_choices %}<div class="col-md-2"><div class="card"><div class="card-body text-center"><h3>{% for k,v in stats.items %}{% if k == s.0 %}{{ v }}{% endif %}{% endfor %}</h3><p class="text-muted small">{{ s.1 }}</p></div></div></div>{% endfor %}
<div class="col-md-4"><div class="card"><div class="card-body text-center"><h3>{{ total }}</h3><p class="text-muted">总房间数</p></div></div></div></div>
{% endblock %}
