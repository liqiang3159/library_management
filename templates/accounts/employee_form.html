{% extends "base.html" %}
{% block content %}
<h4 class="mb-3"><i class="bi bi-person-plus"></i> {% if employee %}编辑员工{% else %}添加员工{% endif %}</h4>
<div class="card"><div class="card-body">
<form method="post">
    {% csrf_token %}
    <div class="row g-3">
        <div class="col-md-6">
            <label class="form-label">用户名</label>
            <input type="text" name="username" class="form-control" value="{{ employee.username|default:'' }}" {% if employee %}readonly{% endif %} required>
        </div>
        <div class="col-md-6">
            <label class="form-label">{% if employee %}新密码（留空不变）{% else %}密码{% endif %}</label>
            <input type="password" name="password" class="form-control" {% if not employee %}required{% endif %}>
        </div>
        <div class="col-md-6">
            <label class="form-label">姓名</label>
            <input type="text" name="real_name" class="form-control" value="{{ employee.real_name|default:'' }}">
        </div>
        <div class="col-md-6">
            <label class="form-label">手机号</label>
            <input type="text" name="phone" class="form-control" value="{{ employee.phone|default:'' }}" required>
        </div>
        <div class="col-md-4">
            <label class="form-label">角色</label>
            <select name="role" class="form-select">
                <option value="super_admin" {% if employee.role == 'super_admin' %}selected{% endif %}>超级管理员</option>
                <option value="front_desk" {% if employee.role == 'front_desk' %}selected{% endif %}>前台员工</option>
                <option value="housekeeping" {% if employee.role == 'housekeeping' %}selected{% endif %}>保洁员工</option>
                <option value="finance" {% if employee.role == 'finance' %}selected{% endif %}>财务人员</option>
            </select>
        </div>
        {% if employee %}
        <div class="col-md-4 d-flex align-items-end">
            <div class="form-check">
                <input type="checkbox" name="is_active" class="form-check-input" id="is_active" {% if employee.is_active %}checked{% endif %}>
                <label class="form-check-label" for="is_active">启用账号</label>
            </div>
        </div>
        {% endif %}
    </div>
    <div class="mt-3">
        <button type="submit" class="btn btn-primary">保存</button>
        <a href="{% url 'employee_list' %}" class="btn btn-secondary">取消</a>
    </div>
</form>
</div></div>
{% endblock %}
