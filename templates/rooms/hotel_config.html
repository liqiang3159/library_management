{% extends "base.html" %}
{% block content %}
<h4><i class="bi bi-gear"></i> 酒店设置</h4>
<div class="col-md-8"><div class="card"><div class="card-body">
<form method="post" enctype="multipart/form-data">{% csrf_token %}
<div class="row"><div class="col-md-6 mb-3"><label class="form-label">酒店名称</label><input type="text" name="name" class="form-control" value="{{ hotel.name }}"></div>
<div class="col-md-6 mb-3"><label class="form-label">联系电话</label><input type="text" name="phone" class="form-control" value="{{ hotel.phone }}"></div></div>
<div class="mb-3"><label class="form-label">地址</label><input type="text" name="address" class="form-control" value="{{ hotel.address }}"></div>
<div class="row"><div class="col-md-4 mb-3"><label class="form-label">默认入住时间</label><input type="time" name="check_in_time" class="form-control" value="{{ hotel.check_in_time|time:'H:i' }}"></div>
<div class="col-md-4 mb-3"><label class="form-label">默认退房时间</label><input type="time" name="check_out_time" class="form-control" value="{{ hotel.check_out_time|time:'H:i' }}"></div>
<div class="col-md-4 mb-3"><label class="form-label">默认押金</label><input type="number" step="0.01" name="deposit_amount" class="form-control" value="{{ hotel.deposit_amount }}"></div></div>
<div class="row"><div class="col-md-6 mb-3"><label class="form-label">超时每小时加收</label><input type="number" step="0.01" name="overtime_hourly_rate" class="form-control" value="{{ hotel.overtime_hourly_rate }}"></div>
<div class="col-md-6 mb-3"><label class="form-label">节假日溢价比例</label><input type="number" step="0.01" name="holiday_surcharge_rate" class="form-control" value="{{ hotel.holiday_surcharge_rate }}"></div></div>
<div class="mb-3"><label class="form-label">门店LOGO</label><input type="file" name="logo" class="form-control"></div>
{% if is_admin %}<button type="submit" class="btn btn-primary">保存设置</button>{% endif %}
</form></div></div></div>
{% endblock %}
